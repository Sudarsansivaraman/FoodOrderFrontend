<!-- Navigation Bar -->
<nav class="navbar">
  <div class="nav-brand">
    <a routerLink="/menu">🍕 Food Order</a>
  </div>

  <div class="nav-links">
    <!-- Always visible -->
    <a routerLink="/menu" class="nav-link">Menu</a>

    <!-- Logged in user links -->
    <a routerLink="/cart" class="nav-link" *ngIf="authService.isLoggedIn()">Cart</a>
    <a routerLink="/orders" class="nav-link" *ngIf="authService.isLoggedIn()">My Orders</a>

    <!-- Admin only -->
    <a routerLink="/admin" class="nav-link admin-link" *ngIf="authService.isAdmin()">Admin</a>

    <!-- Auth buttons -->
    <ng-container *ngIf="!authService.isLoggedIn()">
      <a routerLink="/login" class="nav-link btn-nav">Sign In</a>
      <a routerLink="/register" class="nav-link btn-nav-outline">Register</a>
    </ng-container>

    <ng-container *ngIf="authService.isLoggedIn()">
      <span class="nav-user">Hi, {{ authService.getFullName() }}</span>
      <button class="btn-logout" (click)="logout()">Logout</button>
    </ng-container>
  </div>
</nav>

<!-- Page Content -->
<main class="main-content">
  <router-outlet />
</main>
